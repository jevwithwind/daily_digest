<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kageyomi — Japanese Shadowing Practice</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Kageyomi</h1>
            <p class="subtitle">影読 — Japanese shadowing practice</p>
        </header>

        <section class="input-section">
            <div class="mode-toggle">
                <button class="mode-btn active" data-mode="youtube" onclick="switchMode('youtube')">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M6 5.5L11 8L6 10.5V5.5Z" fill="currentColor"/>
                    </svg>
                    YouTube URL
                </button>
                <button class="mode-btn" data-mode="text" onclick="switchMode('text')">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M3 2H13M3 5H13M3 8H10M3 11H13M3 14H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    Paste Text
                </button>
            </div>

            <div id="youtubeInput" class="input-panel">
                <div class="input-group">
                    <input
                        type="text"
                        id="videoUrl"
                        placeholder="Paste YouTube URL..."
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button id="loadBtn" onclick="loadVideo()">Load</button>
                </div>
            </div>

            <div id="textInput" class="input-panel hidden">
                <textarea
                    id="textArea"
                    placeholder="Paste Japanese text here..."
                    rows="8"
                    spellcheck="false"
                ></textarea>
                <div class="text-footer">
                    <span id="charCount" class="char-count">0 characters</span>
                    <button id="loadTextBtn" onclick="loadText()">Load Text</button>
                </div>
            </div>

            <div id="loadStatus" class="status hidden"></div>
        </section>

        <section id="practiceSection" class="practice-section hidden">
            <div class="paragraph-header">
                <button class="nav-btn" onclick="prevParagraph()" id="prevBtn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <span id="paragraphIndicator">Paragraph 1 / 1</span>
                <button class="nav-btn" onclick="nextParagraph()" id="nextBtn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M6 3L11 8L6 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <div class="paragraph-card">
                <p id="paragraphText" class="paragraph-text"></p>
            </div>

            <div class="controls">
                <button id="listenBtn" class="btn btn-secondary" onclick="playAudio()">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M3 4L14 9L3 14V4Z" fill="currentColor"/>
                    </svg>
                    Listen
                </button>
                <button id="recordBtn" class="btn btn-primary" onclick="toggleRecording()">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <circle cx="9" cy="9" r="5" fill="currentColor"/>
                    </svg>
                    Record
                </button>
            </div>

            <div id="feedbackSection" class="feedback-section hidden">
                <div class="feedback-header">
                    <h3>Feedback</h3>
                    <span id="accuracyBadge" class="accuracy-badge"></span>
                </div>
                <div id="diffDisplay" class="diff-display"></div>
                <div id="missingSection" class="missing-section hidden">
                    <h4>Missing</h4>
                    <p id="missingText"></p>
                </div>
            </div>
        </section>

        <footer>
            <p class="shortcuts">
                <kbd>Space</kbd> Listen &middot;
                <kbd>R</kbd> Record &middot;
                <kbd>&larr;</kbd> Prev &middot;
                <kbd>&rarr;</kbd> Next
            </p>
        </footer>
    </div>

    <audio id="audioPlayer" preload="auto"></audio>
    <script src="/static/app.js"></script>
</body>
</html>
